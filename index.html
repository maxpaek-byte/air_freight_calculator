<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKF 항공요금 계산기 (v6.2)</title>
    <style>
        :root {
            --skf-blue: #004D7E;
            --skf-dark-blue: #00365a;
            --skf-light-blue: #e8f1f8;
            --input-bg: #f5f9fc;
            --calc-bg: #fffdf5;
            --border-color: #dce3e8;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #f0f4f7;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            font-size: 14px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 77, 126, 0.08);
            max-width: 1200px;
            margin: auto;
            overflow-x: auto;
        }

        h1 {
            color: var(--skf-blue);
            padding: 0 0 15px 0;
            margin: 0 0 30px 0;
            font-size: 24px;
            font-weight: 700;
            border-bottom: 2px solid var(--skf-blue);
            display: inline-block;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            margin-bottom: 40px;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 10px 12px;
            white-space: nowrap;
            vertical-align: middle;
        }

        th:last-child, td:last-child { border-right: none; }
        tr:last-child td { border-bottom: none; }

        th {
            background-color: var(--skf-blue);
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .section-title {
            background-color: var(--skf-light-blue);
            color: var(--skf-blue);
            font-weight: 700;
            text-align: left;
            padding-left: 15px;
            font-size: 16px;
        }

        .bg-blue { background-color: var(--input-bg) !important; }
        .bg-yellow { background-color: var(--calc-bg) !important; color: var(--skf-blue); font-weight: 600; }

        input[type="text"], input[type="number"], select {
            width: 95%;
            padding: 6px;
            border: 1px solid transparent;
            border-radius: 4px;
            box-sizing: border-box;
            text-align: center;
            background-color: #ffffff;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--skf-blue);
            box-shadow: 0 0 0 2px rgba(0, 77, 126, 0.2);
        }
        
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; accent-color: var(--skf-blue); }

        .text-left { text-align: left; }
        .text-right { text-align: right; }
        
        .calc-btn {
            background-color: var(--skf-blue);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .calc-btn:hover { background-color: var(--skf-dark-blue); }

        .save-rate-btn {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
        }

        .global-settings { width: auto; margin-bottom: 30px; }
        .total-fare-display { font-size: 18px; color: #d9534f; font-weight: bold; }
        .input-error { border: 1px solid #d9534f !important; background-color: #fdf3f2 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SKF 항공요금 계산기 (v6.2 정밀보정)</h1>

        <table class="global-settings">
            <tr>
                <td class="text-left" style="width: 140px; font-weight: 600;">SEK 환율</td>
                <td class="bg-blue" style="width: 120px;"><input type="number" id="sek-rate" value="147.93" step="0.01"></td>
                <td rowspan="3" style="border: none; vertical-align: middle; text-align: left;">
                    <button class="save-rate-btn" onclick="saveExchangeRates()">환경 설정 저장</button>
                    <div id="save-msg" style="color: #28a745; font-size: 12px; font-weight: bold; display: none; margin-top: 8px; margin-left: 12px;">✅ 저장되었습니다!</div>
                </td>
            </tr>
            <tr>
                <td class="text-left" style="font-weight: 600;">EURO 환율</td>
                <td class="bg-blue"><input type="number" id="euro-rate" value="1633.53" step="0.01"></td>
            </tr>
            <tr>
                <td class="text-left" style="font-weight: 600;">DHL 적용 비율(%)</td>
                <td class="bg-blue"><input type="number" id="dhl-multiplier" value="100" step="0.1"></td>
            </tr>
        </table>

        <table>
            <tr><td colspan="9" class="section-title">AIR 배송 요금 계산</td></tr>
            <tr>
                <td class="text-left" style="width: 100px; font-weight: bold;">선적지 선택</td>
                <td class="bg-blue" style="width: 150px;">
                    <select id="air-dest">
                    </select>
                </td>
                <td colspan="7" style="background-color: #f8f9fa;"></td>
            </tr>
            <thead>
                <tr>
                    <th style="width: 60px;">합산</th>
                    <th style="width: 140px;">제품 형번</th>
                    <th style="width: 80px;">Seal 여부</th>
                    <th style="width: 120px;">리튬배터리</th>
                    <th style="width: 80px;">수량</th>
                    <th style="width: 100px;">순중량(kg)</th>
                    <th style="width: 100px;">8kg 초과</th>
                    <th style="width: 100px;">적용중량(kg)</th>
                    <th style="width: 100px;">최종중량(kg)</th>
                </tr>
            </thead>
            <tbody id="air-tbody">
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2"><button class="calc-btn" onclick="calculateTotal('AIR')">결과 계산하기</button></td>
                    <td colspan="5" class="text-left" style="color: #666; font-size: 13px;">* 제품 6313-2Z(2.13kg) 기준 ITALY 254,000원 출력 확인 완료</td>
                    <td class="text-right" style="font-weight: bold;">합산 중량<br><br>산출 운임</td>
                    <td class="bg-yellow">
                        <div id="air-total-weight">0.00 kg</div>
                        <div id="air-total-fare" class="total-fare-display">0 원</div>
                    </td>
                </tr>
            </tfoot>
        </table>

        <table>
            <tr><td colspan="9" class="section-title">DHL 배송 요금 계산</td></tr>
            <tr>
                <td class="text-left" style="width: 100px; font-weight: bold;">선적지 선택</td>
                <td class="bg-blue" style="width: 150px;">
                    <select id="dhl-dest">
                        <option value="NEA" selected>NEA</option>
                        <option value="MYS">MYS</option>
                        <option value="USA">USA</option>
                    </select>
                </td>
                <td colspan="7" style="background-color: #f8f9fa;"></td>
            </tr>
            <thead>
                <tr>
                    <th>합산</th><th>형번</th><th>Seal</th><th>리튬</th><th>수량</th><th>순중량</th><th>8kg+</th><th>적용중량</th><th>최종중량</th>
                </tr>
            </thead>
            <tbody id="dhl-tbody"></tbody>
            <tfoot>
                <tr>
                    <td colspan="2"><button class="calc-btn" onclick="calculateTotal('DHL')">결과 계산하기</button></td>
                    <td colspan="5"></td>
                    <td class="text-right" style="font-weight: bold;">합산 중량<br><br>산출 운임</td>
                    <td class="bg-yellow">
                        <div id="dhl-total-weight">0.00 kg</div>
                        <div id="dhl-total-fare" class="total-fare-display">0 원</div>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        function loadExchangeRates() {
            const s = localStorage.getItem('skf_sek_rate');
            const e = localStorage.getItem('skf_euro_rate');
            const d = localStorage.getItem('skf_dhl_rate_v4'); 
            if (s) document.getElementById('sek-rate').value = s;
            if (e) document.getElementById('euro-rate').value = e;
            if (d) document.getElementById('dhl-multiplier').value = d;
        }

        function saveExchangeRates() {
            localStorage.setItem('skf_sek_rate', document.getElementById('sek-rate').value);
            localStorage.setItem('skf_euro_rate', document.getElementById('euro-rate').value);
            localStorage.setItem('skf_dhl_rate_v4', document.getElementById('dhl-multiplier').value);
            const m = document.getElementById('save-msg');
            m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 2000);
        }

        // --- DATA STORAGE (v6.2) ---
        const wgtCalTable = [
            { net: 0.1, gross: 1.6, sealy: 1.6 }, { net: 0.2, gross: 1.7, sealy: 1.7 }, { net: 0.3, gross: 1.8, sealy: 1.9 }, { net: 0.4, gross: 1.9, sealy: 2.0 }, { net: 0.5, gross: 2.1, sealy: 2.1 }, { net: 0.6, gross: 2.2, sealy: 2.2 }, { net: 0.7, gross: 2.3, sealy: 2.3 }, { net: 0.8, gross: 2.4, sealy: 2.5 }, { net: 0.9, gross: 2.5, sealy: 2.6 }, { net: 1, gross: 2.6, sealy: 2.7 },
            { net: 1.1, gross: 2.7, sealy: 2.8 }, { net: 1.2, gross: 2.8, sealy: 2.9 }, { net: 1.3, gross: 2.9, sealy: 3.1 }, { net: 1.4, gross: 3, sealy: 3.2 }, { net: 1.5, gross: 3.2, sealy: 3.3 }, { net: 1.6, gross: 3.3, sealy: 3.4 }, { net: 1.7, gross: 3.4, sealy: 3.5 }, { net: 1.8, gross: 3.5, sealy: 3.7 }, { net: 1.9, gross: 3.6, sealy: 3.8 }, { net: 2, gross: 3.7, sealy: 3.9 },
            { net: 3, gross: 4.8, sealy: 5.1 }, { net: 4, gross: 5.9, sealy: 6.3 }, { net: 5, gross: 7.0, sealy: 7.5 }, { net: 6, gross: 7.8, sealy: 8.5 }, { net: 7, gross: 9.1, sealy: 9.8 }, { net: 8, gross: 10.4, sealy: 11.2 }, { net: 9, gross: 11.7, sealy: 12.6 }, { net: 10, gross: 13, sealy: 14 },
            { net: 11, gross: 14.3, sealy: null }, { net: 12, gross: 15.6, sealy: null }, { net: 13, gross: 16.9, sealy: null }, { net: 14, gross: 18.2, sealy: null }, { net: 15, gross: 19.5, sealy: null }, { net: 16, gross: 20.8, sealy: null }, { net: 17, gross: 22.1, sealy: null }, { net: 18, gross: 23.4, sealy: null }, { net: 19, gross: 24.7, sealy: null }, { net: 20, gross: 26, sealy: null },
            { net: 25, gross: 32.5 }, { net: 30, gross: 39 }, { net: 40, gross: 52 }, { net: 50, gross: 65 }, { net: 100, gross: 130 }, { net: 150, gross: 187.5 }, { net: 200, gross: 230.5 }, { net: 300, gross: 230.5 }
        ];

        const dhlChargeTable = [
            { weight: 0.5, NEA: 62000, MYS: 69400, USA: 62100 }, { weight: 1, NEA: 70600, MYS: 79000, USA: 70900 }, { weight: 1.5, NEA: 75000, MYS: 86600, USA: 78000 }, { weight: 2, NEA: 79500, MYS: 94300, USA: 85100 }, { weight: 3, NEA: 87200, MYS: 108300, USA: 98300 }, { weight: 5, NEA: 100900, MYS: 134600, USA: 123900 }, { weight: 10, NEA: 133400, MYS: 193400, USA: 181700 }, { weight: 20, NEA: 194400, MYS: 279100, USA: 269900 }, { weight: 50, NEA: 454800, MYS: 649400, USA: 659500 }, { weight: 100, NEA: 909700, MYS: 1298700, USA: 1319000 }, { weight: 300, NEA: 2729700, MYS: 3895800, USA: 3957000 }
        ];

        // 엑셀 Exchange Rates 탭 기준 내부 SEK 환율
        const exInt = { 'EUR': 11.275, 'USD': 10.745, 'CNY': 1.4402, 'MYR': 2.4437, 'KRW': 0.0076, 'SEK': 1 };

        const airLanes = {
            'ITALY': { terms: 'Door-Port', origin: { r: 0.09, min: 10, hand: 19.8, screen: 0.08, cur: 'EUR' }, air: { min: 20, rates: { 45: 1.36, over: 1.36 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.05, f2: 0.1, c: 161000 },
            'FRANCE': { terms: 'Door-Port', origin: { r: 0.09, min: 10, hand: 19.8, screen: 0.08, cur: 'EUR' }, air: { min: 20, rates: { 45: 1.36, over: 1.36 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.05, f2: 0.05, c: 161000 },
            'GERMANY': { terms: 'Door-Port', origin: { r: 0.09, min: 10, hand: 19.8, screen: 0.08, cur: 'EUR' }, air: { min: 20, rates: { 45: 1.36, over: 1.36 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.05, f2: 0.04, c: 161000 },
            'EDC(BELGIUM)': { terms: 'Door-Port', origin: { r: 0.09, min: 10, hand: 19.8, screen: 0.08, cur: 'EUR' }, air: { min: 20, rates: { 45: 1.36, over: 1.36 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.05, f2: 0, c: 161000 },
            'UK(COOPER)': { terms: 'Door-Port', origin: { r: 0.09, min: 10, hand: 19.8, screen: 0.08, cur: 'EUR' }, air: { min: 20, rates: { 45: 1.36, over: 1.36 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.05, f2: 2.5, c: 187000 },
            'SWEDEN BRG': { terms: 'Door-Port', origin: { r: 0.05, min: 17.36, hand: 18.74, screen: 0.07, cur: 'EUR' }, air: { min: 49.8, rates: { 45: 1.04, over: 1.04 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.1, f2: 0.06, c: 161000 },
            'SWEDEN SEAL*': { terms: 'Door-Port', origin: { r: 0.05, min: 17.36, hand: 18.74, screen: 0.07, cur: 'EUR' }, air: { min: 49.8, rates: { 45: 1.04, over: 1.04 }, fuel: 0.03, cur: 'EUR' }, dest: { thcMin: 50000, thcKg: 150, cur: 'KRW' }, f1: 1.3, f2: 0.06, c: 161000 },
            'USA BRG': { terms: 'Door-Port', origin: { r: 0.37, min: 100, hand: 0, screen: 0.15, cur: 'USD' }, air: { min: 95, rates: { 45: 1.15, over: 1.15 }, fuel: 1.1, sec: 0.1, cur: 'USD' }, dest: { thcMin: 74313, thcKg: 221.64, cur: 'KRW' }, f1: 1.8, f2: 0, c: 76000 },
            'USA SEAL*': { terms: 'Door-Port', origin: { r: 0.37, min: 100, hand: 0, screen: 0.15, cur: 'USD' }, air: { min: 95, rates: { 45: 1.15, over: 1.15 }, fuel: 1.1, sec: 0.1, cur: 'USD' }, dest: { thcMin: 74313, thcKg: 221.64, cur: 'KRW' }, f1: 2.0, f2: 0, c: 76000 },
            'NEA, CHINA BRG': { terms: 'Door-Port', origin: { r: 1.74, min: 600, hand: 55, cur: 'CNY' }, air: { min: 66, rates: { 45: 3.28, 100: 2.58, over: 2.06 }, cur: 'USD' }, dest: { thcMin: 10, thcKg: 0.18, cur: 'USD' }, f1: 1.05, f2: 0, c: 76100, spec: 12.5 },
            'NEA, CHINA SEAL*': { terms: 'Door-Port', origin: { r: 1.74, min: 600, hand: 55, cur: 'CNY' }, air: { min: 66, rates: { 45: 3.28, 100: 2.58, over: 2.06 }, cur: 'USD' }, dest: { thcMin: 10, thcKg: 0.18, cur: 'USD' }, f1: 1.25, f2: 0, c: 76000, spec: 12.5 },
            'MALAYSIA': { terms: 'Door-Door', origin: { r: 0.35, min: 900, hand: 0.55, screen: 0.18, cur: 'MYR' }, air: { min: 1445.85, rates: { 45: 22.32, 100: 5.62, over: 4.82 }, cur: 'MYR' }, dest: { thcMin: 55000, thcKg: 170, onMin: 95000, onKg: 110, cur: 'KRW' }, f1: 1.05, f2: 0.1, c: 161000 }
        };

        function buildRows(tid, type) {
            const b = document.getElementById(tid);
            for (let i = 0; i < 10; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="bg-blue"><input type="checkbox" class="chk-calc"></td>
                    <td class="bg-blue"><input type="text" class="input-pn no-border" placeholder="형번"></td>
                    <td class="bg-blue"><input type="checkbox" class="chk-seal"></td>
                    <td class="bg-blue"><input type="checkbox" class="chk-li"></td>
                    <td class="bg-blue"><input type="number" class="input-qty no-border" value="1" min="1"></td>
                    <td class="bg-blue"><input type="number" class="input-net no-border" step="0.001" placeholder="0.000"></td>
                    <td class="bg-blue"><input type="checkbox" class="chk-over8"></td>
                    <td class="cell-applied bg-yellow">0.00</td>
                    <td class="cell-final bg-yellow">0.00</td>
                `;
                b.appendChild(tr);
                tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', () => calcRow(tr, type)));
                tr.querySelector('.input-pn').addEventListener('blur', async (e) => {
                    const pn = e.target.value.trim().toUpperCase();
                    if(!pn) return; e.target.value = pn;
                    const netIn = tr.querySelector('.input-net');
                    netIn.placeholder = '조회중...';
                    try {
                        const w = await fetchNetWeight(pn);
                        netIn.value = w.toFixed(3);
                        if(w > 8) tr.querySelector('.chk-over8').checked = true;
                        calcRow(tr, type);
                    } catch { netIn.placeholder = '에러(직접입력)'; }
                });
            }
        }

        function calcRow(tr, type) {
            const netVal = parseFloat(tr.querySelector('.input-net').value) || 0;
            const qty = parseInt(tr.querySelector('.input-qty').value) || 0;
            const isSeal = tr.querySelector('.chk-seal').checked;
            const over8 = tr.querySelector('.chk-over8').checked;
            const appCell = tr.querySelector('.cell-applied');
            const finCell = tr.querySelector('.cell-final');

            if(netVal <= 0 || qty <= 0) { appCell.innerText = '0.00'; finCell.innerText = '0.00'; return; }

            const totalNet = netVal * qty;
            
            // Excel VLOOKUP(..., TRUE) 모사 로직
            let matchedRow = wgtCalTable[0];
            for(let r of wgtCalTable) { if(totalNet >= r.net) matchedRow = r; else break; }

            const appWeight = matchedRow.net;
            let finWeight = isSeal ? (matchedRow.sealy || matchedRow.gross) : matchedRow.gross;
            
            // 8kg 할증
            if(over8) finWeight += 15;

            appCell.innerText = appWeight.toFixed(2);
            finCell.innerText = finWeight.toFixed(2);
        }

        function calculateTotal(type) {
            const tbody = document.getElementById(type.toLowerCase() + '-tbody');
            let totalFinW = 0, anyLi = false;
            tbody.querySelectorAll('tr').forEach(tr => {
                if(tr.querySelector('.chk-calc').checked) {
                    totalFinW += parseFloat(tr.querySelector('.cell-final').innerText) || 0;
                    if(tr.querySelector('.chk-li').checked) anyLi = true;
                }
            });

            document.getElementById(type.toLowerCase() + '-total-weight').innerText = totalFinW.toFixed(2) + " kg";
            const fareEl = document.getElementById(type.toLowerCase() + '-total-fare');
            if(totalFinW <= 0) { fareEl.innerText = '0 원'; return; }

            const dest = document.getElementById(type.toLowerCase() + '-dest').value;
            let fare = 0;

            if(type === 'DHL') {
                let match = dhlChargeTable[0];
                for(let r of dhlChargeTable) { if(totalFinW <= r.weight) { match = r; break; } match = r; }
                const base = match[dest];
                const mult = (parseFloat(document.getElementById('dhl-multiplier').value) || 100) / 100;
                fare = (base * mult) + (anyLi ? 7399 : 0);
            } else {
                const lane = airLanes[dest]; if(!lane) return;
                const cw = Math.max(totalFinW, totalFinW * 0.005 * 167);
                const sRate = parseFloat(document.getElementById('sek-rate').value);
                const eRate = parseFloat(document.getElementById('euro-rate').value);

                // Origin
                const oCost = Math.max(lane.origin.min, cw * lane.origin.r) + (lane.origin.hand || 0) + (cw * (lane.origin.screen || 0));
                const oSek = oCost * (exInt[lane.origin.cur] || 1);

                // Air
                const aKey = Object.keys(lane.air.rates).find(k => cw <= parseFloat(k)) || 'over';
                const aCost = Math.max(lane.air.min, cw * lane.air.rates[aKey]) + (cw * (lane.air.fuel || 0)) + (cw * (lane.air.sec || 0));
                const aSek = aCost * (exInt[lane.air.cur] || 1);

                // Dest
                const dCost = Math.max(lane.dest.thcMin, cw * lane.dest.thcKg) + Math.max(lane.dest.onMin || 0, cw * (lane.dest.onKg || 0));
                const dSek = dCost * (exInt[lane.dest.cur] || 1);

                let totalSek = oSek + aSek;
                if(lane.terms === 'Door-Door') totalSek += dSek;
                
                const toInvoiceSek = totalSek * 1.05;
                const liAdd = anyLi ? 35 : 0;

                if(lane.spec) fare = (toInvoiceSek * lane.f1 * sRate) + (lane.spec * eRate) + lane.c;
                else fare = (toInvoiceSek * lane.f1 * sRate) + (cw * lane.f2 * eRate) + lane.c;
                
                fare += (liAdd * eRate);
            }
            fareEl.innerText = (Math.ceil(fare / 100) * 100).toLocaleString() + " 원";
        }

        async function fetchNetWeight(pn) {
            const url = `https://weathered-lab-9c65.maxpaek.workers.dev?designation=${encodeURIComponent(pn)}`;
            try {
                const r = await fetch(url); const d = await r.json();
                const tech = d.documentList.documents[0].technical_data;
                for(let s of tech) {
                    const row = s.rows.find(i => i.id === 'FR_PRODUCT_NET_WEIGHT');
                    if(row) return row.unit.toLowerCase() === 'g' ? parseFloat(row.value)/1000 : parseFloat(row.value);
                }
            } catch(e) { throw e; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const ad = document.getElementById('air-dest');
            Object.keys(airLanes).forEach(k => { const o = document.createElement('option'); o.value = k; o.innerText = k; ad.appendChild(o); });
            loadExchangeRates(); buildRows('dhl-tbody', 'DHL'); buildRows('air-tbody', 'AIR');
        });
    </script>
</body>
